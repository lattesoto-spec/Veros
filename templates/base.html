<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Carelog{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="nav">
    <div class="brand-block">
      <div class="brand">Carelog</div>
      <div class="brand-subtitle">Care operations dashboard</div>
    </div>
    <nav>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('facility_view') }}">Facility</a>
      <a href="{{ url_for('upload') }}">Upload</a>
    </nav>
  </header>
  <main class="container app-shell">
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}
        <div class="flash">{% for m in msgs %}<p>{{ m }}</p>{% endfor %}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
